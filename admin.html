<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAUGNAT Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

  <nav class="navbar navbar-expand-lg bg-warning shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-dark" href="index.html">PAUGNAT ADMIN</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <h2 class="text-center fw-bold mb-4 text-dark">Update College Scores</h2>

            <div class="mb-3">
              <label for="college" class="form-label fw-semibold text-dark">Select College</label>
              <select id="college" class="form-select">
                <option value="1">CITC</option>
                <option value="2">CEA</option>
                <option value="3">COT</option>
                <option value="4">CIE</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="points" class="form-label fw-semibold text-dark">Points to Add</label>
              <input type="number" id="points" class="form-control" placeholder="Enter points">
            </div>

            <div class="d-grid">
              <button class="btn btn-warning fw-bold" onclick="updatePoints()">Update Score</button>
            </div>

            <div id="message" class="mt-3 text-center fw-semibold"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
